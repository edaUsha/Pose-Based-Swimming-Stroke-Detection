name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Remove binary .pt files before pushing
        run: git rm --cached '*.pt'
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "edaUsha"
          git config user.email "edaUsha@users.noreply.github.com"
          git remote add hf https://edaUsha:$HF_TOKEN@huggingface.co/spaces/edaUsha/Pose-Based-Swimming-Stroke-Detection
          git push --force hf main
